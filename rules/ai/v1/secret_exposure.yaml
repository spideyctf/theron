rule_set:
  name: secret_exposure
  version: "1.0.0"
  category: secret_exposure
  module: ai
  description: "Detects hardcoded API keys, tokens, and credentials in code and config files."

skip_files:
  - "*.env.example"
  - "*.env.template"
  - "*.env.sample"

rules:
  - id: AI-SE-001
    title: "Exposed OpenAI API Key"
    severity: CRITICAL
    pattern: 'sk-(?:proj-)?[a-zA-Z0-9]{20,}'
    skip_in_comments: true
    skip_if_contains: ["your_", "placeholder", "example", "xxx", "change_me"]
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded OpenAI API key committed to the repository."
    recommendation: "Immediately rotate this key at https://platform.openai.com/api-keys. Remove it from the codebase and use environment variables or a secret manager."
    references:
      - "https://platform.openai.com/api-keys"
      - "https://cwe.mitre.org/data/definitions/798.html"

  - id: AI-SE-002
    title: "Exposed Anthropic API Key"
    severity: CRITICAL
    pattern: 'sk-ant-[a-zA-Z0-9\-_]{20,}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Anthropic API key committed to the repository."
    recommendation: "Immediately rotate this key at https://console.anthropic.com/settings/keys. Use environment variables or a secret manager."

  - id: AI-SE-003
    title: "Exposed GitHub Personal Access Token"
    severity: CRITICAL
    pattern: 'ghp_[a-zA-Z0-9]{36}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded GitHub Personal Access Token committed to the repository."
    recommendation: "Immediately revoke this token at https://github.com/settings/tokens. Use environment variables or GitHub Secrets."

  - id: AI-SE-004
    title: "Exposed GitHub OAuth Token"
    severity: CRITICAL
    pattern: 'gho_[a-zA-Z0-9]{36}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded GitHub OAuth Token."
    recommendation: "Immediately revoke this token. Use environment variables or GitHub Secrets."

  - id: AI-SE-005
    title: "Exposed GitHub App Token"
    severity: CRITICAL
    pattern: 'ghs_[a-zA-Z0-9]{36}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded GitHub App Token."
    recommendation: "Immediately revoke this token. Use environment variables or GitHub Secrets."

  - id: AI-SE-006
    title: "Exposed Google AI API Key"
    severity: CRITICAL
    pattern: 'AIza[a-zA-Z0-9\-_]{35}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Google AI API key."
    recommendation: "Immediately rotate this key in Google Cloud Console. Use environment variables."

  - id: AI-SE-007
    title: "Exposed Slack Token"
    severity: CRITICAL
    pattern: 'xox[baprs]-[a-zA-Z0-9\-]{10,}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Slack token."
    recommendation: "Immediately revoke this token at https://api.slack.com/apps. Use environment variables."

  - id: AI-SE-008
    title: "Exposed HuggingFace API Token"
    severity: HIGH
    pattern: 'hf_[a-zA-Z0-9]{30,}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded HuggingFace API token."
    recommendation: "Immediately rotate this token at https://huggingface.co/settings/tokens. Use environment variables."

  - id: AI-SE-009
    title: "Exposed AWS Access Key ID"
    severity: CRITICAL
    pattern: 'AKIA[0-9A-Z]{16}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded AWS access key ID."
    recommendation: "Immediately rotate this key in AWS IAM console. Use IAM roles or environment variables."

  - id: AI-SE-010
    title: "Exposed AWS Secret Access Key"
    severity: CRITICAL
    pattern: 'aws_secret_access_key\s*=\s*[''"][^''"]{20,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded AWS secret access key."
    recommendation: "Immediately rotate this key. Use IAM roles or environment variables."

  - id: AI-SE-011
    title: "Exposed Private Key Block"
    severity: CRITICAL
    pattern: '-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'
    cwe: CWE-798
    confidence: high
    description: "Detected private key block in the repository."
    recommendation: "Immediately rotate this key. Remove it from the codebase and git history. Use a secret manager."

  - id: AI-SE-012
    title: "Exposed JWT Token"
    severity: HIGH
    pattern: 'eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: medium
    description: "Detected hardcoded JWT token."
    recommendation: "Rotate this token. JWTs should be generated at runtime, not hardcoded."

  - id: AI-SE-013
    title: "Exposed Replicate API Token"
    severity: HIGH
    pattern: 'REPLICATE_API_TOKEN\s*=\s*[''"][^'']{10,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Replicate API token."
    recommendation: "Rotate this token at https://replicate.com/account/api-tokens. Use environment variables."

  - id: AI-SE-014
    title: "Exposed Cohere API Key"
    severity: HIGH
    pattern: 'COHERE_API_KEY\s*=\s*[''"][^'']{10,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Cohere API key."
    recommendation: "Rotate this key at https://dashboard.cohere.com/api-keys. Use environment variables."

  - id: AI-SE-015
    title: "Exposed Mistral API Key"
    severity: HIGH
    pattern: 'MISTRAL_API_KEY\s*=\s*[''"][^'']{10,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Mistral API key."
    recommendation: "Rotate this key at https://console.mistral.ai/api-keys. Use environment variables."

  - id: AI-SE-016
    title: "Exposed Together AI API Key"
    severity: HIGH
    pattern: 'TOGETHER_AI_KEY\s*=\s*[''"][^'']{10,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded Together AI API key."
    recommendation: "Rotate this key. Use environment variables."

  - id: AI-SE-017
    title: "Generic Hardcoded API Key"
    severity: HIGH
    pattern: '(api[_-]?key|apikey)\s*[:=]\s*[''"][a-zA-Z0-9]{20,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: medium
    description: "Detected generic hardcoded API key."
    recommendation: "Rotate this key. Use environment variables or a secret manager."

  - id: AI-SE-018
    title: "Hardcoded Secret/Password"
    severity: HIGH
    pattern: '(secret|password|passwd|token)\s*[:=]\s*[''"][^'']{8,}[''"]'
    skip_in_comments: true
    cwe: CWE-798
    confidence: medium
    description: "Detected hardcoded secret, password, or token."
    recommendation: "Rotate this credential. Use environment variables or a secret manager."

  - id: AI-SE-019
    title: "Exposed GitHub Refresh Token"
    severity: CRITICAL
    pattern: 'ghr_[a-zA-Z0-9]{76}'
    skip_in_comments: true
    cwe: CWE-798
    confidence: high
    description: "Detected hardcoded GitHub Refresh Token."
    recommendation: "Immediately revoke this token. Use environment variables or GitHub Secrets."
